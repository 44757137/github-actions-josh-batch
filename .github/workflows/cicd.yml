name: CiCd
on:
  workflow_dispatch:
    inputs:
      environments:
        description:
        default: dev
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging
jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "code clone from github"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Container of Docker
        run: echo "Docker container build"
  Test:
    needs: [code,build]
    runs-on: ubuntu-latest
    steps:
      - name: Testing the container
        run: echo "Testing the container"
  Deploy:
    if: inputs.environment == 'dev'
    needs: [Test,build]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Docker compose deployed the app"
